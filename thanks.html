<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Skid Flow Logistics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 60px 48px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 800; color: #0f1f3d; margin-bottom: 12px; }
    p { color: #64748b; font-size: 16px; line-height: 1.6; margin-bottom: 36px; }
    a { display: inline-block; background: #1a56db; color: #fff; padding: 14px 36px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; }
    a:hover { background: #1440a8; }
    .brand { margin-top: 40px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Message received!</h1>
    <p>Thank you for reaching out to Skid Flow Logistics. Our team will review your request and get back to you shortly.</p>
    <a href="https://www.skidflow.ca">← Back to home</a>
    <div class="brand">SKID FLOW LOGISTICS · Metro Vancouver, BC</div>
  </div>
</body>
</html>
